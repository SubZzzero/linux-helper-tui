id: show-file-head
version: 1
type: recipe
category: filesystem
risk: safe
execution: direct
binary: head
command: ""
title:
  en: "Show first lines of a file"
  ua: "Показати перші рядки файлу"
  ru: "Показать первые строки файла"
description:
  en: "Print the first lines from a text file."
  ua: "Виводить перші рядки текстового файлу."
  ru: "Выводит первые строки текстового файла."
args:
  - "-n"
  - "{{lines}}"
  - "{{path}}"
fields:
  - name: path
    type: string
    required: true
    default: "/var/log/syslog"
    description:
      en: "File path"
  - name: lines
    type: string
    required: true
    default: "20"
    description:
      en: "Number of lines"
tags:
  - filesystem
  - file
  - head
examples:
  - args:
      path: "/etc/hosts"
      lines: "10"
    description:
      en: "Read the first 10 lines of /etc/hosts"
