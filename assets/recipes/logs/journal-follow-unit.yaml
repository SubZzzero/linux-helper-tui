id: journal-follow-unit
version: 1
type: recipe
category: logs
risk: elevated
execution: shell
binary: ""
command: "stdbuf -oL -eL journalctl -u {{unit}} -n 50 -f --no-pager"
title:
  en: "Follow a service journal live"
  ua: "Стежити за журналом служби в реальному часі"
  ru: "Следить за журналом службы в реальном времени"
description:
  en: "Show the last 50 journal entries for one systemd unit, then stream new ones live."
  ua: "Показує останні 50 записів журналу для одного systemd-юніта, а потім потоково показує нові."
  ru: "Показывает последние 50 записей журнала для одного systemd-юнита, а затем потоково показывает новые."
args: []
fields:
  - name: unit
    type: string
    required: true
    default: "sshd.service"
    description:
      en: "Systemd unit name"
tags:
  - logs
  - journalctl
  - systemd
  - follow
examples:
  - args:
      unit: "nginx.service"
    description:
      en: "Follow new nginx service log entries live"
