id: follow-log-file
version: 1
type: recipe
category: logs
risk: safe
execution: direct
binary: tail
command: ""
title:
  en: "Follow a log file across rotations"
  ua: "Стежити за лог-файлом через ротації"
  ru: "Следить за лог-файлом через ротации"
description:
  en: "Show the last 50 lines of one log file, then continue across rotations."
  ua: "Показує останні 50 рядків одного лог-файлу, а потім продовжує роботу після ротацій."
  ru: "Показывает последние 50 строк одного лог-файла, а затем продолжает работу после ротаций."
args:
  - "-n"
  - "50"
  - "-F"
  - "{{path}}"
fields:
  - name: path
    type: string
    required: true
    default: "/var/log/syslog"
    description:
      en: "Log file path"
tags:
  - logs
  - tail
  - follow
examples:
  - args:
      path: "/var/log/nginx/access.log"
    description:
      en: "Follow an nginx access log that may rotate"
