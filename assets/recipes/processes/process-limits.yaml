id: process-limits
version: 1
type: recipe
category: processes
risk: elevated
execution: direct
binary: cat
command: ""
title:
  en: "Show process resource limits"
  ua: "Показати ліміти ресурсів процесу"
  ru: "Показать лимиты ресурсов процесса"
description:
  en: "Read runtime resource limits for one process."
  ua: "Читає поточні ліміти ресурсів для одного процесу."
  ru: "Читает текущие лимиты ресурсов для одного процесса."
args:
  - "/proc/{{pid}}/limits"
fields:
  - name: pid
    type: string
    required: true
    default: "1"
    description:
      en: "Process identifier"
tags:
  - processes
  - limits
  - procfs
examples:
  - args:
      pid: "4321"
    description:
      en: "Check file descriptor and process limits for one PID"
