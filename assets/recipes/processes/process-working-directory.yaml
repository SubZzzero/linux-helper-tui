id: process-working-directory
version: 1
type: recipe
category: processes
risk: safe
execution: direct
binary: readlink
command: ""
title:
  en: "Show process working directory"
  ua: "Показати робочий каталог процесу"
  ru: "Показать рабочий каталог процесса"
description:
  en: "Resolve the current working directory of one running process."
  ua: "Визначає поточний робочий каталог одного запущеного процесу."
  ru: "Определяет текущий рабочий каталог одного запущенного процесса."
args:
  - "/proc/{{pid}}/cwd"
fields:
  - name: pid
    type: string
    required: true
    default: "1"
    description:
      en: "Process ID"
tags:
  - processes
  - cwd
  - procfs
examples:
  - args:
      pid: "9876"
    description:
      en: "Resolve the working directory for PID 9876"
