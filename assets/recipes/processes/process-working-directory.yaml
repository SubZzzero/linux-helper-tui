id: process-working-directory
version: 1
type: recipe
category: processes
risk: safe
execution: direct
binary: readlink
command: ""
title:
  en: "Show process working directory"
  ua: "Показати робочий каталог процесу"
  ru: "Показать рабочий каталог процесса"
description:
  en: "Resolve the directory that the process sees as its current working directory (the /proc/<pid>/cwd target)."
  ua: "Визначає каталог, який процес бачить як свій поточний робочий каталог (ціль /proc/<pid>/cwd)."
  ru: "Определяет каталог, который процесс видит как свой текущий рабочий каталог (цель ссылки /proc/<pid>/cwd)."
args:
  - "/proc/{{pid}}/cwd"
fields:
  - name: pid
    type: string
    required: true
    default: "1"
    description:
      en: "Process ID"
tags:
  - processes
  - cwd
  - procfs
examples:
  - args:
      pid: "9876"
    description:
      en: "Resolve the working directory for PID 9876"
