id: process-cgroup
version: 1
type: recipe
category: processes
risk: safe
execution: direct
binary: cat
command: ""
title:
  en: "Show process cgroup membership"
  ua: "Показати належність процесу до cgroup"
  ru: "Показать принадлежность процесса к cgroup"
description:
  en: "Read cgroup membership information for one process."
  ua: "Читає інформацію про належність одного процесу до cgroup."
  ru: "Читает информацию о принадлежности одного процесса к cgroup."
args:
  - "/proc/{{pid}}/cgroup"
fields:
  - name: pid
    type: string
    required: true
    default: "1"
    description:
      en: "Process identifier"
tags:
  - processes
  - cgroup
  - procfs
examples:
  - args:
      pid: "1234"
    description:
      en: "Inspect which cgroups a worker process belongs to"
